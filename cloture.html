<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clôture ticket — Maintenance scolaire</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap');
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'DM Sans',sans-serif;background:#F8FAFC;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
  .card{background:white;border-radius:20px;padding:40px 36px;max-width:440px;width:100%;text-align:center;box-shadow:0 4px 24px rgba(27,63,110,0.10);border:1px solid #CBD5E1;}
  .icon{font-size:52px;margin-bottom:20px;}
  h1{font-size:20px;font-weight:600;color:#1E293B;margin-bottom:10px;}
  p{font-size:14px;color:#64748B;line-height:1.6;margin-bottom:20px;}
  .ticket-info{background:#EBF0F8;border-radius:10px;padding:14px 16px;margin-bottom:24px;text-align:left;font-size:13px;color:#1E293B;line-height:1.9;}
  .ticket-info strong{color:#1B3F6E;}
  .btn{width:100%;padding:14px;border:none;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;cursor:pointer;transition:background .15s;}
  .btn-confirmer{background:#1A7A5E;color:white;margin-bottom:10px;}
  .btn-confirmer:hover{background:#15614A;}
  .btn-annuler{background:#F1F5F9;color:#64748B;}
  .btn-annuler:hover{background:#E2E8F0;}
  .success{display:none;background:#D1FAE5;border:1px solid #9FD8CA;border-radius:12px;padding:20px;margin-top:16px;}
  .success h2{color:#166534;font-size:17px;margin-bottom:6px;}
  .success p{color:#2D6B57;font-size:13px;margin:0;}
  .error-msg{display:none;background:#FEE2E2;border:1px solid #F5B7B1;border-radius:12px;padding:14px;margin-top:16px;color:#C0392B;font-size:13px;}
  .spinner{display:none;width:20px;height:20px;border:2px solid rgba(255,255,255,0.4);border-top-color:white;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto;}
  @keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<div class="card" id="mainCard">
  <div class="icon" id="mainIcon">🏫</div>
  <h1 id="mainTitle">Clôture de ticket</h1>
  <p id="mainDesc">Chargement des informations du ticket…</p>
  <div class="ticket-info" id="ticketInfo" style="display:none"></div>
  <div id="actions" style="display:none">
    <button class="btn btn-confirmer" id="btnConfirmer" onclick="cloturerTicket()">
      <div class="spinner" id="spinner"></div>
      <span id="btnText">✅ Confirmer la clôture</span>
    </button>
    <button class="btn btn-annuler" onclick="window.close()">Annuler</button>
  </div>
  <div class="success" id="successMsg">
    <h2>✅ Ticket clôturé !</h2>
    <p>Le ticket a bien été marqué comme résolu.<br>Merci pour votre intervention.</p>
  </div>
  <div class="error-msg" id="errorMsg"></div>
</div>

<script>
const SUPABASE_URL='https://clakdvjcytmtubenprux.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNsYWtkdmpjeXRtdHViZW5wcnV4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzNTI2MTYsImV4cCI6MjA4ODkyODYxNn0.JAL-tGXPjQCE-FAB2lFI2OZ8-QTEK7RDgs-B5aLTS-0';

const params = new URLSearchParams(window.location.search);
const token = params.get('token');
let ticketId = null;

async function init(){
  if(!token){
    showError('Lien invalide. Ce lien de clôture est incorrect ou a expiré.');
    return;
  }
  try{
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/tickets?token_cloture=eq.${token}&select=id,ecole,secteur,cellule,type_travaux,description,priorite,statut,created_at`,
      {headers:{'apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`}}
    );
    const data = await res.json();
    if(!data.length){
      showError('Ticket introuvable. Ce lien est invalide ou a déjà été utilisé.');
      return;
    }
    const t = data[0];
    ticketId = t.id;
    if(['resolu','annule'].includes(t.statut)){
      document.getElementById('mainIcon').textContent='ℹ️';
      document.getElementById('mainTitle').textContent='Ticket déjà clôturé';
      document.getElementById('mainDesc').textContent='Ce ticket a déjà été marqué comme résolu. Aucune action nécessaire.';
      return;
    }
    // Afficher les infos du ticket
    const date = new Date(t.created_at).toLocaleDateString('fr-FR',{day:'2-digit',month:'long',year:'numeric'});
    document.getElementById('ticketInfo').innerHTML=`
      <div><strong>École :</strong> ${t.ecole||'–'}</div>
      <div><strong>Secteur :</strong> ${t.secteur||'–'}</div>
      <div><strong>Cellule :</strong> ${t.cellule||'–'}</div>
      <div><strong>Type :</strong> ${t.type_travaux||'–'}</div>
      <div><strong>Description :</strong> ${t.description||'–'}</div>
      <div><strong>Signalé le :</strong> ${date}</div>
    `;
    document.getElementById('mainIcon').textContent='🔧';
    document.getElementById('mainTitle').textContent='Confirmer la clôture';
    document.getElementById('mainDesc').textContent='Vous êtes sur le point de marquer ce ticket comme résolu. Confirmez si les travaux ont bien été réalisés.';
    document.getElementById('ticketInfo').style.display='block';
    document.getElementById('actions').style.display='block';
  }catch(e){
    showError('Erreur de connexion. Veuillez réessayer.');
  }
}

async function cloturerTicket(){
  if(!ticketId) return;
  document.getElementById('spinner').style.display='block';
  document.getElementById('btnText').textContent='Clôture en cours…';
  document.getElementById('btnConfirmer').disabled=true;
  try{
    const payload={
      statut:'resolu',
      updated_at: new Date().toISOString(),
      updated_by: 'cloture_mail',
      commentaires: null // sera enrichi ci-dessous
    };
    // Récupérer les commentaires existants pour y ajouter une note
    const r2 = await fetch(`${SUPABASE_URL}/rest/v1/tickets?id=eq.${ticketId}&select=commentaires`,
      {headers:{'apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`}});
    const d2 = await r2.json();
    const ancien = d2[0]?.commentaires||'';
    const note = `[${new Date().toLocaleDateString('fr-FR')}]{cloture_mail} Ticket clôturé via lien mail par le référent.`;
    payload.commentaires = ancien ? ancien+'\n\n'+note : note;

    const res = await fetch(`${SUPABASE_URL}/rest/v1/tickets?id=eq.${ticketId}`,{
      method:'PATCH',
      headers:{'Content-Type':'application/json','apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`,'Prefer':'return=minimal'},
      body:JSON.stringify(payload)
    });
    if(!res.ok) throw new Error();
    // Succès
    document.getElementById('actions').style.display='none';
    document.getElementById('ticketInfo').style.display='none';
    document.getElementById('mainIcon').textContent='✅';
    document.getElementById('mainTitle').textContent='Ticket clôturé avec succès';
    document.getElementById('mainDesc').textContent='Merci ! Le ticket a été marqué comme résolu et l\'historique mis à jour.';
    document.getElementById('successMsg').style.display='block';
  }catch(e){
    showError('Erreur lors de la clôture. Veuillez réessayer ou contacter l\'administrateur.');
    document.getElementById('spinner').style.display='none';
    document.getElementById('btnText').textContent='✅ Confirmer la clôture';
    document.getElementById('btnConfirmer').disabled=false;
  }
}

function showError(msg){
  document.getElementById('mainIcon').textContent='❌';
  document.getElementById('mainTitle').textContent='Impossible de clôturer';
  document.getElementById('mainDesc').textContent='';
  document.getElementById('errorMsg').textContent=msg;
  document.getElementById('errorMsg').style.display='block';
}

init();
</script>
</body>
</html>
